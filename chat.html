<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EIU — یاریدەدەری AI</title>
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #050E18; --sur: #0A1929; --sur2: #0D2137;
  --gold: #C9A84C; --gold2: #E2C472;
  --text: #EAE0CC; --muted: #7A8FA3;
  --border: rgba(201,168,76,0.15);
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: "Scheherazade New", serif;
  background: var(--bg); color: var(--text);
  display: flex; flex-direction: column;
}

/* HEADER */
header {
  flex-shrink: 0; height: 56px;
  background: #07111D;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 14px; gap: 10px; z-index: 10;
}
.logo-img { width: 36px; height: 36px; border-radius: 9px; overflow: hidden; background: #fff; padding: 2px; flex-shrink: 0; }
.logo-img img { width: 100%; height: 100%; object-fit: contain; }
.logo-name { font-size: 0.88rem; color: var(--gold2); font-weight: 700; flex: 1; }
.online { display: flex; align-items: center; gap: 5px; font-size: 0.62rem; color: #6EE7B7; font-weight: 700; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #10B981; animation: p 2s infinite; }
@keyframes p { 0%,100%{opacity:1} 50%{opacity:0.4} }
.hbtn { background: var(--sur2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; cursor: pointer; font-size: 0.65rem; color: var(--muted); font-family: inherit; }

/* MESSAGES */
.msgs {
  flex: 1; overflow-y: auto;
  padding: 18px 16px;
  display: flex; flex-direction: column; gap: 14px;
}
.msgs::-webkit-scrollbar { width: 3px; }
.msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

.row { display: flex; gap: 9px; animation: up 0.25s ease; }
@keyframes up { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.row.u { flex-direction: row-reverse; }

.av { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; align-self: flex-end; }
.av.ai { background: var(--sur2); border: 1px solid var(--border); overflow: hidden; padding: 3px; }
.av.ai img { width: 100%; height: 100%; object-fit: contain; }
.av.usr { background: linear-gradient(135deg, var(--gold), var(--gold2)); font-size: 12px; font-weight: 800; color: #050E18; }

.bub { max-width: 78%; padding: 11px 15px; border-radius: 16px; font-size: 0.88rem; line-height: 1.75; word-break: break-word; }
.bub.ai { background: var(--sur2); border: 1px solid var(--border); border-bottom-right-radius: 4px; }
.bub.u { background: linear-gradient(135deg, #0F2C4F, #1A4972); border-bottom-left-radius: 4px; color: #D8EEFF; }

.dots { display: flex; gap: 5px; padding: 3px; }
.dots span { width: 7px; height: 7px; background: var(--gold); border-radius: 50%; animation: b 1.3s infinite; opacity: 0.7; }
.dots span:nth-child(2) { animation-delay: .2s; }
.dots span:nth-child(3) { animation-delay: .4s; }
@keyframes b { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }

/* QUICK TOPICS */
.topics { display: flex; flex-wrap: wrap; gap: 7px; padding: 0 16px 10px; }
.tp { background: var(--sur2); border: 1px solid var(--border); border-radius: 18px; padding: 6px 13px; font-family: inherit; font-size: 0.72rem; font-weight: 600; color: var(--muted); cursor: pointer; transition: all 0.18s; }
.tp:hover { background: rgba(201,168,76,0.1); color: var(--gold2); border-color: var(--gold); }

/* INPUT */
.inp-zone { flex-shrink: 0; padding: 10px 14px 16px; }
.inp-box { display: flex; align-items: center; gap: 8px; background: var(--sur2); border: 1px solid var(--border); border-radius: 14px; padding: 5px 5px 5px 14px; }
.inp-box:focus-within { border-color: rgba(201,168,76,0.4); box-shadow: 0 0 0 3px rgba(201,168,76,0.07); }
.inp-box input { flex: 1; background: transparent; border: none; font-family: inherit; font-size: 0.9rem; color: var(--text); padding: 9px 0; }
.inp-box input::placeholder { color: var(--muted); }
.inp-box input:focus { outline: none; }
.sbtn { background: linear-gradient(135deg, var(--gold), var(--gold2)); border: none; border-radius: 11px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 17px; flex-shrink: 0; transition: all 0.2s; }
.sbtn:hover { transform: scale(0.95); }
.sbtn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
.hint { text-align: center; font-size: 0.58rem; color: var(--muted); margin-top: 6px; }
</style>
</head>

<div class="topics" id="topics">
  <button class="tp" data-q="ڕێنماییەکی تەواو بنووسە بۆ نووسینی ڕاپۆرتی ئەکادیمی">📄 ڕاپۆرت</button>
  <button class="tp" data-q="٥ بابەتی توێژینەوە پێشنیار بکە">🤖 AI</button>
  <button class="tp" data-q="کۆدی Python بنووسە بۆ شیکردنەوەی CSV">🐍 Python</button>
  <button class="tp" data-q="ئامار بۆ توێژینەوە ڕوون بکەرەوە">📊 ئامار</button>
  <button class="tp" data-q="فەلسەفەی ئەرستۆ ڕوون بکەرەوە">🧠 فەلسەفە</button>
  <button class="tp" data-q="ڕێنمایی سەرچاوەنووسی APA">📚 APA</button>
</div>

<div class="inp-zone">
  <div class="inp-box">
    <input id="inp" type="text" placeholder="پرسیارەکەت بنووسە... (کوردی، ئینگلیزی، عەرەبی)" autocomplete="off">
    <button class="sbtn" id="btn">✈️</button>
  </div>
  <div class="hint">Erbil International University · EIU © 2025</div>
</div>

<script>
const msgs = document.getElementById('msgs');
const inp  = document.getElementById('inp');
const btn  = document.getElementById('btn');
const LOGO = document.querySelector('.av.ai img').src;
let history = [];

document.getElementById('clearBtn').addEventListener('click', () => {
  history = [];
  msgs.innerHTML = '';
  addMsg('پەیامەکان سڕایەوە ✅', 'ai');
  document.getElementById('topics').style.display = 'flex';
});

function addMsg(text, role) {
  const row = document.createElement('div');
  row.className = 'row' + (role === 'user' ? ' u' : '');
  const av = document.createElement('div');
  av.className = 'av ' + (role === 'user' ? 'usr' : 'ai');
  if (role === 'user') { av.textContent = 'ت'; }
  else { const img = document.createElement('img'); img.src = LOGO; img.alt = 'EIU'; av.appendChild(img); }
  const bub = document.createElement('div');
  bub.className = 'bub ' + (role === 'user' ? 'u' : 'ai');
  bub.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').split('\n').join('<br>');
  row.appendChild(av);
  row.appendChild(bub);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const row = document.createElement('div'); row.className = 'row'; row.id = 'typing';
  const av = document.createElement('div'); av.className = 'av ai';
  const img = document.createElement('img'); img.src = LOGO; img.alt = 'EIU'; av.appendChild(img);
  const bub = document.createElement('div'); bub.className = 'bub ai';
  bub.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  row.appendChild(av); row.appendChild(bub);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping() { document.getElementById('typing')?.remove(); }

async function send(text) {
  const q = (text || inp.value).trim();
  if (!q || btn.disabled) return;
  inp.value = '';
  addMsg(q, 'user');
  history.push({ role: 'user', content: q });
  document.getElementById('topics').style.display = 'none';
  btn.disabled = true;
  showTyping();
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    hideTyping();
    if (data.error) { addMsg('❌ ' + data.error, 'ai'); }
    else { addMsg(data.reply, 'ai'); history.push({ role: 'assistant', content: data.reply }); }
  } catch(e) {
    hideTyping();
    addMsg('❌ هەڵەی تەکنیکی ڕوویدا، دووبارە هەوڵ بدەوە.', 'ai');
  } finally {
    btn.disabled = false;
    inp.focus();
  }
}

btn.addEventListener('click', () => send());
inp.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
document.querySelectorAll('.tp').forEach(t => {
  t.addEventListener('click', () => send(t.dataset.q));
});
</script>
